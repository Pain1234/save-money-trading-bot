# Mandatory CI gate for Python tests, lint, and governance checks (Issue #53).
# Branch protection is NOT enabled until default-branch migration (#52) is approved.

name: CI

on:
  pull_request:
  push:
    branches:
      - cursor/railway-paper-dashboard-v1

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate Python syntax
        run: |
          python -m compileall -q services scripts tests

      - name: Validate issue template YAML files
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in sorted(Path(".github/ISSUE_TEMPLATE").glob("*.yml")):
              if path.name == "config.yml":
                  continue
              text = path.read_text(encoding="utf-8")
              for key in ("name:", "description:", "body:"):
                  if key not in text:
                      raise SystemExit(f"missing {key!r} in {path}")
              print(f"ok: {path}")
          PY

      - name: Run governance unit tests
        run: python -m unittest tests/governance/test_github_project_setup.py -v

      - name: Check pull request diff for whitespace errors
        if: github.event_name == 'pull_request'
        run: |
          git diff --check \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests (no PostgreSQL, no dashboard build)
        run: |
          python -m pytest tests/ \
            --ignore=tests/paper_trading \
            --ignore=tests/market_data \
            --ignore=tests/deploy \
            -q

  postgres:
    name: postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paper_trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d paper_trading_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PAPER_TRADING_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/paper_trading_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run PostgreSQL integration tests
        run: |
          python -m pytest tests/paper_trading -m "postgres and not soak" -q --tb=short
