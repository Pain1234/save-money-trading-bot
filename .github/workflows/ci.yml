# Legacy monolithic CI workflow (pre fast/full split, Issue #53/#65).
# Kept ONLY as an emergency rollback switch. It performs no work by default.
#
# Active pipelines: ci-fast.yml + ci-full.yml. See
# docs/ci/ACTIONS_OPTIMIZATION_STAGE_2.md for why the split happened and
# docs/ci/REQUIRED_CHECK_MIGRATION.md for the branch-protection migration
# plan.
#
# To fully restore the old monolithic job set instead of using this stub,
# revert this file to its pre-Stage-2 contents from git history:
#   git show 0306a56:.github/workflows/ci.yml > .github/workflows/ci.yml
#   git show 9acde68:.github/workflows/ci.yml > .github/workflows/ci.yml
# (0306a56 and 9acde68 are the last two commits that touched the full
# monolithic workflow before the fast/full split; either is a complete,
# working copy.) Then disable/delete ci-fast.yml and ci-full.yml, or leave
# them running alongside the restored legacy workflow temporarily.

name: CI (legacy rollback)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type ROLLBACK-LEGACY-CI to run the old monolithic job set"
        required: true
        type: string

permissions:
  contents: read

jobs:
  refuse-unless-confirmed:
    name: refuse-unless-confirmed
    if: inputs.confirm != 'ROLLBACK-LEGACY-CI'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Refuse to run without explicit confirmation
        run: |
          echo "This is a rollback-only stub. It does not run the old CI job set."
          echo "Re-run with confirm=ROLLBACK-LEGACY-CI only if you intend to acknowledge"
          echo "that ci-fast.yml/ci-full.yml are the active pipelines and you are"
          echo "deliberately falling back to the legacy workflow shape (see the"
          echo "comment at the top of this file for how to restore it from git history)."
          exit 1

  acknowledged:
    name: acknowledged
    if: inputs.confirm == 'ROLLBACK-LEGACY-CI'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Rollback acknowledged
        run: |
          echo "Rollback confirmed, but this stub intentionally does not re-implement"
          echo "the legacy job set inline (that would silently duplicate maintenance"
          echo "burden with ci-fast.yml/ci-full.yml)."
          echo ""
          echo "Restore the full legacy workflow from git history instead:"
          echo "  git show 9acde68:.github/workflows/ci.yml > .github/workflows/ci.yml"
          echo "Then commit that restored file directly (it will replace this stub)."
