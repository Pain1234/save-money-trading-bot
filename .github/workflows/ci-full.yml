# Full CI lane (Stage 2 Actions-usage optimization).
#
# Runs the complete heavy test matrix (postgres integration, research
# reproducibility, dashboard build) but only when it is actually needed:
# push to main, workflow_dispatch, a merge queue run, or a pull request
# carrying the "full-ci" label. Unlabeled draft/in-progress PRs skip this
# entire workflow to save Actions minutes; see ci-fast.yml for the checks
# that run on every PR push.
#
# Phase 1 note: the `test-deploy` and `postgres` compatibility jobs below
# only report when Full CI actually runs. On an unlabeled PR they do not
# report at all, so a PR cannot merge until Full CI has run at least once
# (add the "full-ci" label, or push to main after review). See
# docs/ci/REQUIRED_CHECK_MIGRATION.md and docs/branch-protection.md.
#
# Active pipelines: ci-fast.yml + ci-full.yml (this file).
# Legacy monolithic workflow: ci.yml (dispatch-only rollback stub).

name: Full CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, labeled, unlabeled]
  merge_group:
    branches: [main]

concurrency:
  group: full-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  should-run:
    name: should-run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_full: ${{ steps.decide.outputs.run_full }}
    steps:
      - name: Decide whether Full CI should run
        id: decide
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HAS_FULL_CI_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'full-ci') }}
        run: |
          set -euo pipefail
          run_full=false
          case "$EVENT_NAME" in
            workflow_dispatch|push|merge_group)
              run_full=true
              echo "$EVENT_NAME: always run Full CI"
              ;;
            pull_request)
              if [ "$HAS_FULL_CI_LABEL" = "true" ]; then
                run_full=true
                echo "pull_request: 'full-ci' label present, running Full CI"
              else
                echo "pull_request: 'full-ci' label not present, skipping Full CI"
              fi
              ;;
            *)
              echo "unrecognized event $EVENT_NAME, skipping Full CI"
              ;;
          esac
          echo "run_full=${run_full}" >> "$GITHUB_OUTPUT"

  full-quality:
    name: full-quality
    needs: should-run
    if: needs.should-run.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Validate Python syntax
        run: python -m compileall -q services scripts tests

      - name: Validate issue template YAML files
        run: |
          python - <<'PY'
          from pathlib import Path

          for path in sorted(Path(".github/ISSUE_TEMPLATE").glob("*.yml")):
              if path.name == "config.yml":
                  continue
              text = path.read_text(encoding="utf-8")
              for key in ("name:", "description:", "body:"):
                  if key not in text:
                      raise SystemExit(f"missing {key!r} in {path}")
              print(f"ok: {path}")
          PY

      - name: Run governance unit tests
        run: python -m unittest discover -s tests/governance -p 'test_*.py' -v

      - name: Check pull request diff for whitespace errors
        if: github.event_name == 'pull_request'
        run: |
          git diff --check \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"

      - name: Sanity check baseline file has no local paths
        run: |
          if grep -E '(^-e |file://|[@] file:)' requirements-baseline.txt; then
            echo "requirements-baseline.txt contains editable or file:// paths"
            exit 1
          fi

      - name: Install from requirements-baseline.txt in clean venv
        run: |
          python -m venv .venv-baseline-test
          .venv-baseline-test/bin/pip install --upgrade pip
          .venv-baseline-test/bin/pip install -r requirements-baseline.txt

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

  core-tests:
    name: core-tests
    needs: should-run
    if: needs.should-run.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SESSION_SECRET: "01234567890123456789012345678901"
      PRIVATE_PAPER_API_URL: "http://127.0.0.1:8080"
      AUTH_USERNAME: monitor
      AUTH_PASSWORD_HASH: "$2a$12$testhashfortestbuildonlyxxxxxxxxxxxxxxxxxxxxxx"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests (no PostgreSQL, no live, no soak, no reporting, no dashboard build)
        run: |
          python -m pytest tests/ \
            --ignore=tests/deploy \
            -m "not postgres and not live and not soak and not reporting" \
            -q

      - name: Run market_data tests (no live network, no PostgreSQL)
        run: |
          python -m pytest tests/market_data -m "not live and not postgres" -q --tb=short

      - name: Run deploy tests (dashboard build + bundle checks)
        run: |
          python -m pytest tests/deploy -q --tb=short

  postgres-and-reporting:
    name: postgres-and-reporting
    needs: should-run
    if: needs.should-run.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paper_trading_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d paper_trading_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PAPER_TRADING_DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/paper_trading_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run PostgreSQL integration tests
        run: |
          python -m pytest tests/paper_trading tests/market_data -m "postgres and not soak" -q --tb=short

      - name: Run reporting performance tests (PostgreSQL)
        # Latency budgets soft (in artifact); HTTP/schema failures still fail.
        run: |
          python -m pytest tests/perf -m "reporting and postgres" -q --tb=short

      - name: Upload dashboard perf regression artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-perf-regression-report
          path: |
            docs/operations/dashboard-perf-regression-report.json
          if-no-files-found: warn
          retention-days: 30

  research-repro:
    name: research-repro
    needs: should-run
    if: needs.should-run.outputs.run_full == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Research schema + identity + runner + registry gate
        run: |
          python -m pytest tests/research \
            tests/paper_trading/test_backtester_parity.py \
            tests/paper_trading/test_backtester_signal_parity.py \
            -q --tb=short
          python -c "from research.experiment_spec import load_experiment_spec; load_experiment_spec('examples/research/btc_eth_sol_experiment.example.json', check_json_schema=True)"

      - name: Double-run semantic artifact gate (#146)
        run: |
          python -m pytest tests/research/test_double_run_repro.py -v --tb=short

  full-ci-required:
    name: full-ci-required
    needs: [should-run, full-quality, core-tests, postgres-and-reporting, research-repro]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check required job results
        shell: bash
        env:
          RUN_FULL: ${{ needs.should-run.outputs.run_full }}
        run: |
          set -euo pipefail
          if [ "$RUN_FULL" != "true" ]; then
            echo "Full CI not requested for this event; nothing to gate."
            exit 0
          fi

          python scripts/ci/check_required_gate.py \
            --result "full-quality=${{ needs.full-quality.result }}" \
            --result "core-tests=${{ needs.core-tests.result }}" \
            --result "postgres-and-reporting=${{ needs.postgres-and-reporting.result }}" \
            --result "research-repro=${{ needs.research-repro.result }}" \
            --require "full-quality=success" \
            --require "core-tests=success" \
            --require "postgres-and-reporting=success" \
            --require "research-repro=success"

  # --- Phase-1 compatibility aliases -----------------------------------
  # Only report when Full CI actually ran. On an unlabeled PR these jobs are
  # skipped entirely (no check reported at all), which keeps a PR from
  # merging via legacy branch-protection required checks until Full CI has
  # run. See docs/ci/REQUIRED_CHECK_MIGRATION.md.
  test-deploy:
    name: test-deploy
    needs: [should-run, full-ci-required]
    if: >-
      always() && needs.should-run.outputs.run_full == 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mirror full-ci-required result
        run: |
          echo "full-ci-required result: ${{ needs.full-ci-required.result }}"
          [ "${{ needs.full-ci-required.result }}" = "success" ]

  postgres:
    name: postgres
    needs: [should-run, full-ci-required]
    if: >-
      always() && needs.should-run.outputs.run_full == 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Mirror full-ci-required result
        run: |
          echo "full-ci-required result: ${{ needs.full-ci-required.result }}"
          [ "${{ needs.full-ci-required.result }}" = "success" ]
