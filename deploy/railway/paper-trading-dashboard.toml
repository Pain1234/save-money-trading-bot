[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile.dashboard"
# If Railway falls back to Railpack, set this variable on the service:
# RAILPACK_CONFIG_FILE=deploy/railpack/dashboard.railpack.json

[deploy]
startCommand = "node server.js"
restartPolicyType = "ALWAYS"
numReplicas = 1
healthcheckPath = "/login"
healthcheckTimeout = 60

[env]
RAILPACK_CONFIG_FILE = "deploy/railpack/dashboard.railpack.json"
